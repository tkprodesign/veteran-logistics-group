<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Branding Gallery</title>
    <style>
        :root {
            --bg: #f6f7fb;
            --card: #ffffff;
            --text: #152457;
            --muted: #5c678c;
            --border: #d9dfef;
            --shadow: 0 20px 40px rgba(21, 36, 87, 0.08);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 32px;
            font-family: Arial, Helvetica, sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        .wrap { max-width: 1200px; margin: 0 auto; }
        h1 { margin: 0 0 10px; font-size: 40px; line-height: 1.1; }
        p { margin: 0 0 28px; font-size: 18px; color: var(--muted); }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 24px;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: var(--shadow);
            padding: 20px;
        }
        .label {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 16px;
            word-break: break-word;
        }
        .image-box {
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            border-radius: 16px;
            background:
                linear-gradient(45deg, #eef2fb 25%, transparent 25%),
                linear-gradient(-45deg, #eef2fb 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #eef2fb 75%),
                linear-gradient(-45deg, transparent 75%, #eef2fb 75%);
            background-size: 24px 24px;
            background-position: 0 0, 0 12px, 12px -12px, -12px 0;
            border: 1px solid var(--border);
        }
        .image-box img {
            max-width: 100%;
            max-height: 260px;
            object-fit: contain;
            display: block;
        }
        @media (max-width: 860px) {
            body { padding: 18px; }
            .grid { grid-template-columns: 1fr; }
            h1 { font-size: 30px; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>Branding Gallery</h1>
        <p>Active branding files only. concept and X folders excluded.</p>
        <div class="grid">
            <section class="card"><div class="label">logo-horizontal-dark.png</div><div class="image-box"><img src="../assets/images/branding/logo-horizontal-dark.png" alt="logo-horizontal-dark.png"></div></section>
            <section class="card"><div class="label">logo-horizontal-light.png</div><div class="image-box"><img src="../assets/images/branding/logo-horizontal-light.png" alt="logo-horizontal-light.png"></div></section>
            <section class="card"><div class="label">mark-only.png</div><div class="image-box"><img src="../assets/images/branding/mark-only.png" alt="mark-only.png"></div></section>
            <section class="card"><div class="label">logo-stacked-dark.png</div><div class="image-box"><img src="../assets/images/branding/logo-stacked-dark.png" alt="logo-stacked-dark.png"></div></section>
            <section class="card"><div class="label">logo-stacked-light.png</div><div class="image-box"><img src="../assets/images/branding/logo-stacked-light.png" alt="logo-stacked-light.png"></div></section>
            <section class="card"><div class="label">logo-stacked-monochrome-dark.png</div><div class="image-box"><img src="../assets/images/branding/logo-stacked-monochrome-dark.png" alt="logo-stacked-monochrome-dark.png"></div></section>
        </div>
    </div>
</body>
</html>
